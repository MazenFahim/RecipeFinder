<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="styles/signup.css">
    <link rel="stylesheet" href="styles/style.css">
    <body>
        <nav class="navbar">
        <div class="nav-logo">
            🍽️ RecipeFinder
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="favorites.html">Favorites</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>

        <div class="nav-search">
            <input type="text" placeholder="Search recipes...">
            <button>🔍</button>
        </div>
        </nav>

        <div class="sign-up-inputs">
            <span id="sign-up-text">Sign up</span>
            <span class="subtitle">Sign up to continue</span>
        
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
        
            <button id="sign-up-btn" onclick="window.location.href='https://www.instagram.com/';">
                Sign up
            </button>
        
            <input type="checkbox" id="remember-me" title="Remember me">
            <label for="remember-me">Remember me</label>
        </div>
        
        <div class="already-have">
            <label id="have-acc">Already have an account?</label>
            <a href="https://google.com" id="sign-in-btn" target="_blank">Sign in</a>
        </div>
    </body>
</html>
