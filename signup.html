<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="signup.css">
<body>
    <nav style="background:#ff7300;padding:10px;">
        <a href="index.html" style="color:white;margin-right:15px;">Home</a>
        <a href="recipe-details.html" style="color:white;margin-right:15px;">Recipes</a>
        <a href="favorites.html" style="color:white;margin-right:15px;">Favorites</a>
        <a href="login.html" style="color:white;margin-right:15px;">Login</a>
        <a href="signup.html" style="color:white;">Sign Up</a>

        <div class="sign-up-inputs">
            <span id="sign-up-text">Sign up</span>
            <span class="subtitle">Sign up to continue</span>
        
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
        
            <button id="sign-up-btn" onclick="window.location.href='https://www.instagram.com/';">
                Sign up
            </button>
        
            <input type="checkbox" id="remember-me" title="Remember me">
            <label for="remember-me">Remember me</label>
        </div>
        
        <div class="already-have">
            <label id="have-acc">Already have an account?</label>
            <a href="https://google.com" id="sign-in-btn" target="_blank">Sign in</a>
        </div>
</body>
