<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <!-- <link rel="stylesheet" href="signup.css"> -->

    <div class="sign-up-inputs">
        <span id="sign-up-text">Sign up</span>
        <span class="subtitle">Sign up to continue</span>
    
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <button id="sign-up-btn" onclick="window.location.href='https://facebook.com';">
            Sign up
        </button>

        <input type="checkbox" id="remember-me" title="Remember me">
        <label for="remember-me">Remember me</label>
    </div>

    <label id="have-acc">Already have an account?</label>
    <button id="sign-in-btn" onclick="window.location.href='login.html';">
        Sign in
    </button>
</body>
</html>
