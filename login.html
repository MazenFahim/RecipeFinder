<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-logo">🍽️ RecipeFinder</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="favorites.html">Favorites</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="signup.html">Sign Up</a></li>
    </ul>
    <div class="nav-search">
      <input type="text" placeholder="Search recipes...">
      <button>🔍</button>
    </div>
  </nav>
  <hr>

  <div align="center">
    <h2>Login</h2>

    <form id="loginForm">
      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="###@gmail.com">
      </div>
      <br><br>
      <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required placeholder="Enter your password">
      </div>
      <br>
      <button type="submit">Login</button>
      <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function (event) {
      event.preventDefault();

      // Get email and password values from the form and send login request to server
      const emailValue = document.getElementById('email').value;
      const passwordValue = document.getElementById('password').value;

      try {
        // Send login request to server and wait for response
        const response = await fetch('http://localhost:3000/login', {
          method: 'POST',  // Use POST as we send data in the body 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailValue, password: passwordValue })
        });

        const data = await response.json();

        // If login is successful, store token and admin status 
        if (response.ok) {

          // we use local storage to store the token and admin status so we can use them in other pages to check if user is logged in and if he is admin or not
          localStorage.setItem('is_admin', data.is_admin);
          localStorage.setItem('token', data.token);


          alert('Login successfully!');

          window.location.href = 'view-recipe.html';

        } else {
          alert(data.message || 'Login failed!');
        }

      } catch (error) {
        console.error("Error during login:", error);
        alert('An error occurred. Please try again later.');
      }
    });
  </script>
</body>

</html>
