<!DOCTYPE html>
<html>
<head>
    <title>Add New Recipe</title>
</head>
<body>
<header>
    <h1>Add New Recipe</h1>
</header>

<section>
    <a href="admin_dashboard.html"> <- Back to Dashboard</a>
    <br><br>

    <form action="#" method="POST">
        <table>
            <tr>
                <td><label for="recipeID">Recipe ID: </label></td>
                <td><input type="text" id="recipeID" name="recipeID" placeholder="Enter recipe ID (REC-001)"></td>
            </tr>
            <tr>
                <td><label for="recipeName">Recipe Name:</label></td>
                <td><input type="text" id="recipeName" name="recipeName" placeholder="Enter the recipe name"></td>
            </tr>
            <tr>
                <td><label for="Course">Course:</label></td>
                <td>
                    <select name="Course" id="Course">
                        <option value="" disabled selected>Select Course</option>
                        <option value="1">Appetizers</option>
                        <option value="2">Main Course</option>
                        <option value="3">Dessert</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="ingredientID">Ingredient ID:</label></td>
                <td><input type="text" id="ingredientID" name="ingredientID" placeholder="Enter the Ingredient id"></td>
            </tr>
            <tr>
                <td><label for="Ingredients">Ingredients:</label></td>
                <td><textarea name="Ingredients" id="Ingredients" cols="20" rows="10" placeholder="Enter Ingredients of this recipe"></textarea></td>
            </tr>
        </table>
        <br>
        <input type="submit" value="Add Recipe">
        <input type="reset" value="Reset Form">
    </form>
</section>
</body>
</html>
