<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Recipe</title>
    <link rel="stylesheet" href="Admin_Styles/admin.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">
        Admin Panel
    </div>
    <ul class="nav-links">
        <li><a href="admin_dashboard.html">Dashboard</a></li>
        <li><a href="add-recipe.html">Add Recipe</a></li>
        <li><a href="view-recipe.html">View Recipes</a></li>
        <li><a href="edit-recipe.html">Edit Recipe</a></li>
        <li><a href="index.html">Log Out</a></li>
    </ul>
</nav>


<div class ="admin-container">
    <h1>Add New Recipe</h1>
    <h2><i>Fill in the details below to add a new recipe to the collection.</i></h2>
    <section>
       <a href="admin_dashboard.html"> <h3 class="back">&#8592; Back to Dashboard</h3></a>
       <br><br>

      <form id="addRecipeForm" action="#" method="POST">
        <table>
            <tr>
                <td><label for="recipeID">Recipe ID: </label></td>
                <td>
                    <input type="text" id="recipeID" name="recipeID" placeholder="Enter recipe ID (REC-001)">
                    <span class="error-message" id="recipeIDError"></span>
                </td>
            
            </tr>
            <tr>
                <td><label for="recipeName">Recipe Name:</label></td>
                <td>
                    <input type="text" id="recipeName" name="recipeName" placeholder="Enter the recipe name">
                    <span class="error-message" id="recipeNameError"></span>
                </td>
            </tr>
            <tr>
                <td><label for="Course">Course:</label></td>
                <td>
                    <select name="Course" id="Course">
                        <option value="">Select Course</option>
                        <option value="1">Appetizers</option>
                        <option value="2">Main Course</option>
                        <option value="3">Dessert</option>
                    </select>
                    <span class="error-message" id="courseError"></span>
                </td>
            </tr>
            <tr>
                <td><label for="ingredientID">Ingredient ID:</label></td>
                <td>
                    <input type="text" id="ingredientID" name="ingredientID" placeholder="Enter the Ingredient id">
                    <span class="error-message" id="ingredientIDError"></span>
                </td>
            </tr>
            </tr>
            <tr>
                <td><label for="Ingredients">Ingredients:</label></td>
                <td>
                    <textarea name="Ingredients" id="Ingredients" cols="8" rows="4"
                        placeholder="Enter Ingredients of this recipe"></textarea>
                    <span class="error-message" id="ingredientsError"></span>
                    </td>
            </tr>
        </table>
        <br>
            <span id="form-success" class="success-message"></span> 
            <span id="form-error" class="error-message"></span> 
        <br>
        <input type="submit" id="submitBtn" value="Add Recipe" class="btn-submit">
        <input type="reset" id="resetBtn" value="Reset Form" class="btn-reset">
      </form>
    </section>
</div>
<script src="scripts/data.js"></script>
<script src="scripts/admin.js"></script>
</body>
</html>
