<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Recipe</title>
    <link rel="stylesheet" href="styles/edit-recipe.css">
</head>

<body>

<header>
    <h1>Edit Existing Recipe</h1>
</header>

<section class="container">
    <a href="admin_dashboard.html" class="back-link">&lt; Back to Dashboard</a>

    <div class="card">
        <form action="#" method="GET" class="search-form">
            <label for="searchID">Enter Recipe ID to Edit:</label>
            <div class="search-box">
                <input type="text" id="searchID" name="searchID" placeholder="e.g. REC-1">
                <input type="button" value="Search" onclick="searchRecipe()">
            </div>
        </form>
    </div>

    <div class="card">
        <form action="#" method="POST" id="editForm">
            <table class="form-table">
                <tr>
                    <td><label for="editRecipeName">Update Recipe Name:</label></td>
                    <td><input type="text" id="editRecipeName" placeholder="Update name"></td>
                </tr>

                <tr>
                    <td><label for="editCourse">Update Course:</label></td>
                    <td>
                        <select id="editCourse">
                            <option value="" disabled selected>Select Course</option>
                            <option value="Appetizers">Appetizers</option>
                            <option value="Main Course">Main Course</option>
                            <option value="Dessert">Dessert</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="editIngredients">Update Ingredients:</label></td>
                    <td>
                        <textarea id="editIngredients" rows="5" placeholder="Update Ingredients"></textarea>
                    </td>
                </tr>
            </table>

            <br>
            <input type="submit" value="Save Changes" class="save-btn">
        </form>
    </div>
</section>

<script>
    // Variable to store current recipe ID that will be edited 
    let currentId = ""; 

    
    async function searchRecipe() {
        const id = document.getElementById("searchID").value;

        if (!id) {
            alert("Please enter a Recipe ID!");
            return;
        }

        // Send GET request to server to fetch recipe details by ID 
        try {
            const response = await fetch(`http://localhost:3000/recipes/${id}`);

            // If recipe is found, populate the form fields with existing data for editing
            if (response.ok) {
                const recipe = await response.json();

                currentId = id;
                document.getElementById("editRecipeName").value = recipe.recipeName;
                document.getElementById("editCourse").value = recipe.course;
                document.getElementById("editIngredients").value = recipe.ingredients;
            } else {
                alert("Recipe not found on server!");
            }
        } catch (error) {
            console.error("Search error:", error);
            alert("Connection error. Could not search for recipe.");
        }
    }

    // Load recipe details if ID is provided in URL query parameters (e.g. edit-recipe.html?id=REC-1)
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const idFromUrl = urlParams.get('id');
        if (idFromUrl) {
            document.getElementById("searchID").value = idFromUrl;
            searchRecipe(); 
        }
    };    

    document.getElementById("editForm").onsubmit = async function (e) {
        e.preventDefault();

        if (!currentId) {
            alert("Please search for a recipe first!");
            return;
        }

        // get toeken from local storage to allow admin to edit recipe
        const token = localStorage.getItem('token');
        
        
        const updatedData = {
            recipeName: document.getElementById("editRecipeName").value,
            course: document.getElementById("editCourse").value,
            ingredients: document.getElementById("editIngredients").value
        };

        if (!updatedData.recipeName || !updatedData.course) {
            alert("Please fill all fields!");
            return;
        }
 
        // Send PUT request to server to update recipe details by ID
        try {
            const response = await fetch(`http://localhost:3000/recipes/${currentId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(updatedData)
            });

            if (response.ok) {
                alert("Recipe updated successfully in database ✅");
                window.location.href = 'view-recipe.html';
            } else {
                const errorData = await response.json();
                alert("Failed to update: " + (errorData.message || "Unauthorized"));
            }
        } catch (error) {
            console.error("Update error:", error);
            alert("An error occurred while saving changes.");
        }
    };
</script>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
