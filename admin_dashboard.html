<html>
    <head>
        <title>Admin Dashboard</title>
    </head>
    <body>
        <header>
            <h1>Admin Dashboard</h1>
        </header>
        <h2><i>Welcome, Admin!</i></h2>
        <section>
            <h3>Manage Recipes</h3>
            <p>1-Add New Recipe</p>
            <form> 
                <label>Recipe ID:</label>
                 <input type = "text" placeholder="Enter the recipe id"> 
                 <br/> 
                 <label>Recipe Name:</label> 
                 <input type = "text" placeholder="Enter the recipe name" >
                <br/> 
                <label>Department:</label> 
                <select name="Department" id="Department" placeholder="Enter the department"> 
                    <option value="" disabled selected>Select department</option>
                    <option value="1">main course</option> 
                    <option value="2">appetizers</option>
                    <option value="3">dessert</option>
                </select> 
                <br/>
                <label>Ingredients:</label> 
                <textarea name="Ingredients" cols="20" rows="10" placeholder="Enter Ingredients of this recipe"></textarea> 
            </form> 
            <hr>    
            <p>2-View All Recipes:</p>
            <input type="button" value="View">
            <hr>
            <p>3-Edit Recipe:</p>
            <input type="button" value="Edit">
            <hr>
            <p>4-Delete Recipe:</p>
            <input type="button" value="Delete">
            <hr>
            <input type="submit" value="Add"> 
            <input type="reset" value="Reset"> 
        </section>
    </body>
</html>
