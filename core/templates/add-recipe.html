<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Recipe</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'Admin_Styles/admin.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">
        Admin Panel
    </div>
    <ul class="nav-links">
        <li><a href="{% url 'admin-dashboard' %}">Dashboard</a></li>
        <li><a href="{% url 'admin-add-recipe' %}">Add Recipe</a></li>
        <li><a href="{% url 'admin-view-recipes' %}">View Recipes</a></li>
        <li><a href="{% url 'admin-edit-recipe' %}">Edit Recipe</a></li>
        <li><a href="{% url 'logout' %}">Log Out</a></li>
    </ul>
</nav>


<div class ="admin-container">
    <h1>Add New Recipe</h1>
    <h2><i>Fill in the details below to add a new recipe to the collection.</i></h2>
    <section>
       <a href="{% url 'admin-dashboard' %}"> <h3 class="back">&#8592; Back to Dashboard</h3></a>
       <br><br>

<form id="addRecipeForm">
        {% csrf_token %} <table>
        <tr>
            <td><label for="recipeName">Recipe Name:</label></td>
            <td>
                <input type="text" id="recipeName" name="name" required placeholder="Enter the recipe name">
                <span class="error-message" id="recipeNameError"></span>
            </td>
        </tr>
        <tr>
            <td><label for="Course">Course:</label></td>
            <td>
                <select name="course_name" id="Course" required>
                    <option value="">Select Course</option>
                    <option value="appetizers">Appetizers</option>
                    <option value="main course">Main Course</option>
                    <option value="dessert">Dessert</option>
                </select>
                <span class="error-message" id="courseError"></span>
            </td>
        </tr>
        <tr>
            <td><label for="Ingredients">Description:</label></td>
            <td>
                <textarea name="description" id="description" cols="8" rows="4"
                    placeholder="Enter short description of this recipe"></textarea>
                <span class="error-message" id="ingredientsError"></span>
            </td>
        </tr>
        <tr>
    <td><label for="prep_time">Prep Time (minutes):</label></td>
    <td>
        <input type="number" id="prep_time" name="prep_time" min="0" placeholder="e.g. 30">
        <span class="error-message" id="prepTimeError"></span>
    </td>
</tr>

<tr>
    <td><label for="image">Recipe Image:</label></td>
    <td>
        <input type="file" id="image" name="image" accept="image/*">
        <span class="error-message" id="imageError"></span>
    </td>
</tr>

<tr>
    <td><label for="ingredients">Ingredients:</label></td>
    <td>
        <input type="text" id="ingredients" name="ingredients" placeholder="e.g. sugar, milk, flour">
        <small>Comma separated</small>
        <span class="error-message" id="ingredientsError"></span>
    </td>
</tr>
    </table>
    <br>
    <input type="submit" id="submitBtn" value="Add Recipe" class="btn-submit">
    <input type="reset" id="resetBtn" value="Reset Form" class="btn-reset">
</form>
    </section>
</div>
<script src="{% static 'scripts/data.js' %}"></script>
<script src="{% static 'scripts/admin.js' %}"></script>
</body>
</html>
