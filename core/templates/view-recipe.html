<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% load static %}
    <link rel="stylesheet" href="{% static 'Admin_Styles/view-recipe.css' %}">
</head>
<body>

    <nav class="navbar">

        </div>
        <ul class="nav-links">
            <li><a href="{% url 'admin-dashboard' %}">Dashboard</a></li>
