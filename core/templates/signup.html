<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles/signup.css' %}">
    <link rel="stylesheet" href="{% static 'styles/style.css' %}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">
            🍽️ RecipeFinder
        </div>

        <div class="nav-search">
            <input type="text" placeholder="Search recipes...">
            <button>🔍</button>
        </div>
    </nav>

    <main class="sign-up-container">
        <div class="sign-up-card">
            <span id="sign-up-text">Sign up</span>
            <span class="subtitle">Sign up to continue</span>

            <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}
                <div class="input-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="username" required placeholder="Enter your name">
                </div>

                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>

                <div class="remember-container">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Remember me</label>
                </div>

                <button type="submit" id="sign-up-btn">Sign up</button>
                <button type="button" id="sign-up-admin-btn">Sign up as Admin</button>
            </form>

            <div class="already-have">
                <span id="have-acc">Already have an account?</span>
                <a href="{% url 'login' %}" id="sign-in-link">Sign in</a>
            </div>
        </div>
    </main>
</body>
<script src="{% static 'scripts/signup.js' %}"></script>
</html>
